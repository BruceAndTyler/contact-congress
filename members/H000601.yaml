bioguide:  H000601
contact_form:
  method: post
  action: /email-me/#wpcf7-f8521-o1
  steps:
    - visit: "https://www.hagerty.senate.gov/email-me/"
    - wait:
        - value: 3
    - javascript:
        - value: "Array.prototype.forEach.call(document.querySelectorAll('style,[rel=\"stylesheet\"],[type=\"text/css\"]'), function(element){ try{ element.parentNode.removeChild(element) } catch(err){} });"    
    - fill_in:
        - name: "FirstName"
          selector: "#wpcf7-f8521-o1 input[name='FirstName']"
          value: $NAME_FIRST
          required: true
        - name: "LastName"
          selector: "#wpcf7-f8521-o1 input[name='LastName']"
          value: $NAME_LAST
          required: true
        - name: "your-message"
          selector: "#wpcf7-f8521-o1 textarea[name='your-message']"
          value: $MESSAGE
          required: true
        - name: "subject"
          selector: "#wpcf7-f8521-o1 input[name='subject']"
          value: $SUBJECT
          required: true
        - name: "Address1"
          selector: "#wpcf7-f8521-o1 input[name='Address1']"
          value: $ADDRESS_STREET
          required: true
        - name: "City"
          selector: "#wpcf7-f8521-o1 input[name='City']"
          value: $ADDRESS_CITY
          required: true
        - name: "ZipCode"
          selector: "#wpcf7-f8521-o1 input[name='ZipCode']"
          value: $ADDRESS_ZIP5
          required: true
        - name: "your-email"
          selector: "#wpcf7-f8521-o1 input[name='your-email']"
          value: $EMAIL
          required: true
        - name: phone
          selector: "input[name='Telephone']"
          value: $PHONE
          required: true
    - select:
        - name: "Topic"
          selector: "#wpcf7-f8521-o1 select[name='Topic']"
          value: $TOPIC
          required: true
          options:
            - Agriculture
            - Animal Rights
            - Appropriations
            - Arts & Humanities
            - Banking & Financial Services
            - Budget
            - Business and Commerce
            - Campaign/Election Reform
            - Consumer Protection
            - Children
            - Defense and Military
            - Economic Development
            - Education
            - Energy
            - Environment
            - Ethics Reform
            - Foreign Relations
            - Guns
            - Healthcare
            - Homeland Security
            - Housing and Urban Affairs
            - Immigration
            - Insurance Problems
            - Interior
            - Intelligence
            - Judiciary
            - Labor
            - Nutrition
            - Postal Service
            - Science and Innovation
            - Seniors
            - Social Issues
            - Taxes
            - Technology and Telecom
            - Trade
            - Transportation
            - Veterans
            - Women and Children
        - name: state
          selector: "select[name='State']"
          value: $ADDRESS_STATE_FULL
          required: true
          options:
            Alabama: Alabama
            Alaska: Alaska
            American Samoa: American Samoa
            Arizona: Arizona
            Arkansas: Arkansas
            California: California
            Colorado: Colorado
            Connecticut: Connecticut
            Delaware: Delaware
            District of Columbia: District of Columbia
            Florida: Florida
            Georgia: Georgia
            Guam: Guam
            Hawaii: Hawaii
            Idaho: Idaho
            Illinois: Illinois
            Indiana: Indiana
            Iowa: Iowa
            Kansas: Kansas
            Kentucky: Kentucky
            Louisiana: Louisiana
            Maine: Maine
            Maryland: Maryland
            Massachusetts: Massachusetts
            Michigan: Michigan
            Minnesota: Minnesota
            Mississippi: Mississippi
            Missouri: Missouri
            Montana: Montana
            Nebraska: Nebraska
            Nevada: Nevada
            New Hampshire: New Hampshire
            New Jersey: New Jersey
            New Mexico: New Mexico
            New York: New York
            North Carolina: North Carolina
            North Dakota: North Dakota
            Ohio: Ohio
            Oklahoma: Oklahoma
            Oregon: Oregon
            Pennsylvania: Pennsylvania
            Puerto Rico: Puerto Rico
            Rhode Island: Rhode Island
            South Carolina: South Carolina
            South Dakota: South Dakota
            Tennessee: Tennessee
            Texas: Texas
            Utah: Utah
            Vermont: Vermont
            Virgin Islands: Virgin Islands
            Virginia: Virginia
            Washington: Washington
            West Virginia: West Virginia
            Wisconsin: Wisconsin
            Wyoming: Wyoming
        - name: prefix
          selector: "select[name='Prefix']"
          value: $NAME_PREFIX
          required: true
          options:
            Mr.: Mr.
            Ms.: Ms.
            Mrs.: Mrs.
            Miss: Miss
            Mr. and Mrs.: Mr. and Mrs.
            Mx: Mx
            Dr.: Dr.
    - click_on:
        - value: Send
          selector: "#wpcf7-f8521-o1 input[type='submit']"
    - wait:
        - value: 10
    - javascript:
        - value: "Array.prototype.forEach.call(document.querySelectorAll('style,[rel=\"stylesheet\"],[type=\"text/css\"]'), function(element){ try{ element.parentNode.removeChild(element) } catch(err){} });"    
  success:
    headers:
      status: 200
    body:
      contains: Thank you

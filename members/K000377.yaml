bioguide:  K000377
contact_form:
  method: post
  action: /
  steps:
    - visit: "https://www.kelly.senate.gov/contact/contact-form/"
    - wait:
        - value: 10
    - javascript:
        - value: "document.querySelector('.elementor-location-header').remove();"
    - javascript:
        - value: "document.querySelector('#gform_wrapper_1').style.display = 'block'"
    - javascript:
        - value: "if (typeof jQuery !== 'undefined' && jQuery('#input_1_7').unmask) jQuery('#input_1_7').unmask();"
    - fill_in:
        - name: "input_2"
          selector: "input[name='input_2']"
          value: $NAME_FIRST
          required: true
        - name: "input_3"
          selector: "input[name='input_3']"
          value: $NAME_LAST
          required: true
        - name: "input_12"
          selector: "textarea[name='input_12']"
          value: $MESSAGE
          required: true
        - name: "input_11"
          selector: "input[name='input_11']"
          value: $SUBJECT
          required: true
        - name: "input_6.1"
          selector: "input[name='input_6.1']"
          value: $ADDRESS_STREET
          required: true
        - name: "input_6.3"
          selector: "input[name='input_6.3']"
          value: $ADDRESS_CITY
          required: true
        - name: "input_6.5"
          selector: "input[name='input_6.5']"
          value: $ADDRESS_ZIP5
          required: true
        - name: "input_9"
          selector: "input[name='input_9']"
          value: $EMAIL
          required: true
        - name: "input_9_2"
          selector: "input[name='input_9_2']"
          value: $EMAIL
          required: true
        - name: "input_7"
          selector: "#input_1_7"
          value: $PHONE_PARENTHESES
          required: true
    - select:
        - name: "input_17"
          selector: "select[name='input_17']"
          value: $TOPIC
          required: true
          options:
             Agriculture: AGR
             Animal Rights: ANIMAL RIGHTS
             Appropriations: APP
             "Arts & Humanities": ARTS
             "Banking & Financial Services": FIN_OVSIGHT
             Budget: NO CODE
             "Campaign/Election Reform": CAMPR
             Children: KIDS
             Consumer Protection: CONSUMER PROTECTION
             Defense and Military: DEF or MIL
             Economic Development: ECON
             Education: EDU
             Energy: ENE
             Environment: ENV
             Ethics Reform: NO CODE
             Foreign Relations: INT
             Guns: GUN_VIO
             Healthcare: HEALTH
             Homeland Security: HOM
             Housing and Urban Affairs: HOUSING
             Immigration: IMM
             Insurance Problems: NO CODE
             Intelligence: SURVEILLANCE
             Interior: NO CODE
             Judiciary: JUD
             Labor: LABOR
             Nutrition: SNAP
             Postal Service: POSTAL
             Science and Innovation: SCIENCE
             Seniors: SENIORS
             Social Issues: SOC
             Taxes: TAX
             Technology and Telecom: TECH and TELECOMM
             Trade: TRADE
             Transportation: TRANSPO
             Veterans: VET
             Women and Children: "WOMENS ISSUES.P"
        - name: state
          selector: "#input_1_6_4"
          value: $ADDRESS_STATE_FULL
          required: true
          options:
            Alabama: Alabama
            Alaska: Alaska
            American Samoa: American Samoa
            Arizona: Arizona
            Arkansas: Arkansas
            California: California
            Colorado: Colorado
            Connecticut: Connecticut
            Delaware: Delaware
            District of Columbia: District of Columbia
            Florida: Florida
            Georgia: Georgia
            Guam: Guam
            Hawaii: Hawaii
            Idaho: Idaho
            Illinois: Illinois
            Indiana: Indiana
            Iowa: Iowa
            Kansas: Kansas
            Kentucky: Kentucky
            Louisiana: Louisiana
            Maine: Maine
            Maryland: Maryland
            Massachusetts: Massachusetts
            Michigan: Michigan
            Minnesota: Minnesota
            Mississippi: Mississippi
            Missouri: Missouri
            Montana: Montana
            Nebraska: Nebraska
            Nevada: Nevada
            New Hampshire: New Hampshire
            New Jersey: New Jersey
            New Mexico: New Mexico
            New York: New York
            North Carolina: North Carolina
            North Dakota: North Dakota
            Ohio: Ohio
            Oklahoma: Oklahoma
            Oregon: Oregon
            Pennsylvania: Pennsylvania
            Puerto Rico: Puerto Rico
            Rhode Island: Rhode Island
            South Carolina: South Carolina
            South Dakota: South Dakota
            Tennessee: Tennessee
            Texas: Texas
            Utah: Utah
            Vermont: Vermont
            Virgin Islands: Virgin Islands
            Virginia: Virginia
            Washington: Washington
            West Virginia: West Virginia
            Wisconsin: Wisconsin
            Wyoming: Wyoming
        - name: prefix
          selector: "#input_1_1"
          value: $NAME_PREFIX
          required: true
          options:
            Mr.: Mr.
            Ms.: Ms.
            Mrs.: Mrs.
            Miss: Miss
            Mr. and Mrs.: Mr. and Mrs.
            Mx: Mx
            Dr.: Dr.
    - click_on:
        - selector: "#choice_1_18_0"
    - javascript:
        - value: document.querySelector('#gform_1').insertAdjacentHTML('beforeend', "<textarea name='g-recaptcha-response' id='g-recaptcha-response'></textarea>");
    - recaptcha:
        - value: true
    - click_on:
        - value: Submit
          selector: input[type='submit']
    - wait:
        - value: 10
    - javascript:
        - value: "document.querySelector('#gform_wrapper_1').style.display = 'block'"
  success:
    headers:
      status: 200
    body:
      contains: Thank you for sharing your thoughts
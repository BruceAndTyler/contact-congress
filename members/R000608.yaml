          required: true
        - name: "form_fields[email]"
          selector: "#form-field-email"
          value: $EMAIL
          required: true
        - name: "form_fields[subject]"
          selector: "#form-field-subject"
          value: $SUBJECT
          required: true
        - name: "form_fields[message]"
          selector: "#form-field-message"

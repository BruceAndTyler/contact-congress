        - name: prefix
          selector: "#input-B03E0527-4040-F985-52CD-C0DD6BEF325F"
          value: $NAME_PREFIX
          required: true
          options:
            Mr.: Mr.
            Ms.: Ms.
            Mrs.: Mrs.
            Miss: Miss
            Dr.: Dr.
            Reverend: Reverend
    - javascript:
        - value: document.querySelector("#input-B03E05B4-4040-F985-52CD-8DF0BC10EEE2").value = document.querySelector("#input-B03E05B4-4040-F985-52CD-8DF0BC10EEE2").value.replace(/"/g, '');
    - click_on:
        - value: Submit
          selector: ".btn"
    - wait:
        - value: 3
  success:
    headers:
      status: 200
    body:
      contains: "Thank you for taking the time to send me your comments."

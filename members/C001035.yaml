bioguide:  C001035
contact_form:
  method: post
  action: /contact
  steps:
    - visit: "https://www.collins.senate.gov/contact/email-senator-collins/form"
    - fill_in:
        - name: "input_B03E05C4-4040-F985-52CD-9CA44623DE5E"
          selector: "#firstName"
          value: $NAME_FIRST
          required: true
        - name: "input_B03E04BD-4040-F985-52CD-48E090E769DA"
          selector: "#input-B03E04BD-4040-F985-52CD-48E090E769DA"
          value: $NAME_LAST
          required: true
        - name: "input_B03E05F1-4040-F985-52CD-A580E72A7D41"
          selector: "#input-B03E05F1-4040-F985-52CD-A580E72A7D41"
          value: $ADDRESS_STREET
          required: true
        - name: "input_B03E0595-4040-F985-52CD-C572364023FE"
          selector: "#input-B03E0595-4040-F985-52CD-C572364023FE"
          value: $ADDRESS_CITY
          required: true
        - name: "input_B03E046E-4040-F985-52CD-A2F10450D58D"
          selector: "#input-B03E046E-4040-F985-52CD-A2F10450D58D"
          value: $PHONE
          required: true
        - name: "input_B03E04CC-4040-F985-52CD-4DDB58DA474A"
          selector: "#input-B03E04CC-4040-F985-52CD-4DDB58DA474A"
          value: $ADDRESS_ZIP5
          required: true
        - name: "input_B03E0536-4040-F985-52CD-AFE12CDE8D31"
          selector: "#email"
          value: $EMAIL
          required: true
        - name: "input_B03E05A4-4040-F985-52CD-730C08912F4F"
          selector: "#input-B03E05A4-4040-F985-52CD-730C08912F4F"
          value: $EMAIL
          required: true
        - name: "input_B03E05B4-4040-F985-52CD-8DF0BC10EEE2"
          selector: "#input-B03E05B4-4040-F985-52CD-8DF0BC10EEE2"
          value: $MESSAGE
          required: true
          options:
            max_length: 10000
    - javascript:
        - value: >
            (function() {
              var radios = document.querySelectorAll('input[type=radio]');
              var groups = {};
              for (var i = 0; i < radios.length; i++) {
                var n = radios[i].name;
                if (!groups[n]) groups[n] = [];
                var lbl = document.querySelector("label[for='" + radios[i].id + "']");
                groups[n].push({inp: radios[i], label: lbl ? lbl.textContent.trim() : '', lbl: lbl});
              }
              var groupNames = Object.keys(groups);
              if (groupNames.length >= 1) {
                var respGroup = groups[groupNames[0]];
                for (var j = 0; j < respGroup.length; j++) {
                  if (respGroup[j].label.toLowerCase() === 'yes' && respGroup[j].lbl) {
                    respGroup[j].lbl.click();
                    break;
                  }
                }
              }
              if (groupNames.length >= 2) {
                var newsGroup = groups[groupNames[1]];
                for (var k = 0; k < newsGroup.length; k++) {
                  if (newsGroup[k].label.toLowerCase() === 'no' && newsGroup[k].lbl) {
                    newsGroup[k].lbl.click();
                    break;
                  }
                }
              }
            })();
    - select:
        - name: "input_B03E04DB-4040-F985-52CD-18F332336F99"
          selector: "#input-B03E04DB-4040-F985-52CD-18F332336F99"
          value: $TOPIC
          required: true
          options:
            - General/Other
            - Agriculture
            - Animal Welfare
            - Arts/Humanities
            - Banking/Finance
            - Broadband/Telecommunications
            - Criminal Justice
            - Defense/Homeland Security
            - Education
            - Environment/Energy
            - Foreign Affairs
            - Health Care
            - Housing
            - Immigration
            - Jobs/Labor
            - Judiciary
            - Small Businesses
            - Social Security
            - Taxes
            - Trade
            - Transportation
            - Veterans
        - name: state
          selector: "#input-B03E0669-4040-F985-52CD-11B231195172"
          value: $ADDRESS_STATE_POSTAL_ABBREV
          required: true
          options:
            AA: AA
            AE: AE
            AK: AK
            AL: AL
            AP: AP
            AR: AR
            AZ: AZ
            CA: CA
            CO: CO
            CT: CT
            DC: DC
            DE: DE
            FL: FL
            GA: GA
            HI: HI
            IA: IA
            ID: ID
            IL: IL
            IN: IN
            KS: KS
            KY: KY
            LA: LA
            MA: MA
            MD: MD
            ME: ME
            MI: MI
            MN: MN
            MO: MO
            MS: MS
            MT: MT
            NC: NC
            ND: ND
            NE: NE
            NH: NH
            NJ: NJ
            NM: NM
            NV: NV
            NY: NY
            OH: OH
            OK: OK
            OR: OR
            PA: PA
            RI: RI
            SC: SC
            SD: SD
            TN: TN
